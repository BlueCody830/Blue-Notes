<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Notes Media Editor</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #071f3d, #0f4c81);
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #d9f1ff;
    }

    header p {
      color: #b7ddf5;
      line-height: 1.5;
    }

    .storage-info {
      margin-top: 12px;
      color: #bae6fd;
      font-size: 0.9rem;
    }

    .note-box,
    .note-card,
    .modal-card {
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .note-box {
      background: rgba(255, 255, 255, 0.12);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 30px;
    }

    .note-box input,
    .note-box textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
    }

    .note-box textarea {
      resize: vertical;
      min-height: 130px;
    }

    button,
    .file-label {
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      text-align: center;
      font-size: 0.95rem;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .file-label {
      background: #bae6fd;
      color: #04243d;
      display: block;
    }

    .file-label:hover {
      background: #e0f2fe;
    }

    input[type="file"] {
      display: none;
    }

    .record-btn {
      background: #22c55e;
      color: white;
    }

    .record-btn:hover {
      background: #16a34a;
    }

    .stop-btn {
      background: #ef4444;
      color: white;
    }

    .stop-btn:hover {
      background: #dc2626;
    }

    .save-btn {
      background: #38bdf8;
      color: #04243d;
      width: 100%;
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .save-btn:hover {
      background: #7dd3fc;
    }

    .cancel-btn {
      background: #64748b;
      color: white;
      width: 100%;
      font-size: 1rem;
      display: none;
    }

    .cancel-btn:hover {
      background: #475569;
    }

    .status {
      color: #d9f1ff;
      text-align: center;
      margin-bottom: 12px;
      min-height: 22px;
      font-size: 0.9rem;
    }

    .attachments-title {
      margin: 12px 0 10px;
      color: #d9f1ff;
      font-size: 1rem;
    }

    .attachment-list {
      display: grid;
      gap: 10px;
      margin-bottom: 15px;
    }

    .no-attachments {
      color: #b7ddf5;
      font-size: 0.9rem;
      font-style: italic;
    }

    .attachment-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      background: rgba(255, 255, 255, 0.12);
      padding: 12px;
      border-radius: 12px;
    }

    .attachment-icon {
      font-size: 1.45rem;
    }

    .attachment-details {
      min-width: 0;
    }

    .attachment-details strong,
    .attachment-details span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-details strong {
      color: #ffffff;
      margin-bottom: 4px;
    }

    .attachment-details span {
      color: #bae6fd;
      font-size: 0.82rem;
    }

    .attachment-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .open-attachment-btn {
      background: #0ea5e9;
      color: white;
      padding: 9px 12px;
      font-size: 0.82rem;
    }

    .open-attachment-btn:hover {
      background: #0284c7;
    }

    .remove-media-btn {
      background: #ef4444;
      color: white;
      padding: 9px 12px;
      font-size: 0.82rem;
    }

    .remove-media-btn:hover {
      background: #dc2626;
    }

    .dashboard-title {
      margin-bottom: 15px;
      color: #d9f1ff;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .note-card {
      background: #e0f2fe;
      color: #082f49;
      padding: 18px;
      border-radius: 15px;
      animation: fadeIn 0.3s ease;
    }

    .note-card h3 {
      margin-bottom: 8px;
      color: #075985;
    }

    .note-card small {
      display: block;
      color: #0369a1;
      margin-bottom: 12px;
    }

    .note-text {
      white-space: pre-wrap;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .note-media-btn {
      background: #bae6fd;
      color: #075985;
      width: 100%;
      margin-bottom: 14px;
    }

    .note-media-btn:hover {
      background: #7dd3fc;
    }

    .card-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .edit-btn {
      background: #0ea5e9;
      color: white;
      flex: 1;
    }

    .edit-btn:hover {
      background: #0284c7;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      flex: 1;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .empty-message {
      text-align: center;
      color: #b7ddf5;
      margin-top: 20px;
      font-style: italic;
    }

    .media-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.82);
      padding: 14px;
      display: grid;
      place-items: center;
    }

    .media-modal[hidden] {
      display: none;
    }

    .modal-card {
      width: min(100%, 950px);
      max-height: calc(100vh - 28px);
      overflow: hidden;
      background: #061d35;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .modal-header h2 {
      color: #d9f1ff;
      font-size: 1.1rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-header-actions {
      display: flex;
      gap: 8px;
    }

    .modal-back {
      background: #0ea5e9;
      color: white;
      padding: 8px 11px;
      font-size: 0.82rem;
    }

    .modal-close {
      background: #ef4444;
      color: white;
      padding: 8px 11px;
      font-size: 0.82rem;
    }

    .modal-body {
      padding: 16px;
      overflow: auto;
      min-height: 200px;
    }

    .modal-body img,
    .modal-body video {
      display: block;
      width: 100%;
      max-height: 74vh;
      object-fit: contain;
      border-radius: 10px;
      background: black;
    }

    .modal-body audio {
      width: 100%;
      margin-top: 10px;
    }

    .modal-file-info {
      color: #b7ddf5;
      margin-bottom: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .loading-text,
    .modal-empty {
      color: #d9f1ff;
      text-align: center;
      padding: 35px 10px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #b7ddf5;
      font-size: 0.9rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 14px;
      }

      header h1 {
        font-size: 2rem;
      }

      .attachment-row {
        grid-template-columns: auto 1fr;
      }

      .attachment-actions {
        grid-column: 1 / -1;
        justify-content: stretch;
      }

      .attachment-actions button {
        flex: 1;
      }

      .card-buttons {
        flex-direction: column;
      }

      .modal-header {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Blue Notes Media Editor</h1>
      <p>Create notes with text, photos, videos, and voice recordings.</p>
      <p class="storage-info" id="storageInfo">Checking local storage...</p>
    </header>

    <section class="note-box">
      <input type="text" id="noteTitle" placeholder="Note title..." />
      <textarea id="noteText" placeholder="Write your note here..."></textarea>

      <div class="tools">
        <label for="mediaInput" class="file-label">Add Photos or Videos</label>
        <input type="file" id="mediaInput" accept="image/*,video/*" multiple />

        <button class="record-btn" id="recordBtn">Start Voice Recording</button>
        <button class="stop-btn" id="stopBtn" disabled>Stop Recording</button>
      </div>

      <p class="status" id="statusText"></p>

      <p class="attachments-title">Attachments</p>
      <div class="attachment-list" id="attachmentList"></div>

      <button class="save-btn" id="saveBtn">Save Note</button>
      <button class="cancel-btn" id="cancelBtn">Cancel Edit</button>
    </section>

    <h2 class="dashboard-title">Notes Dashboard</h2>
    <section class="notes-grid" id="notesDashboard"></section>

    <p class="empty-message" id="emptyMessage">No notes yet. Add your first note above.</p>

    <footer>
      <p>Made with HTML, CSS, JavaScript and IndexedDB</p>
    </footer>
  </div>

  <div class="media-modal" id="mediaModal" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Attachment</h2>

        <div class="modal-header-actions">
          <button class="modal-back" id="modalBackBtn" hidden>Back</button>
          <button class="modal-close" id="modalCloseBtn">Close</button>
        </div>
      </div>

      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const DB_NAME = "BlueNotesMediaDB";
    const DB_VERSION = 2;

    const NOTES_STORE = "notes";
    const ATTACHMENT_META_STORE = "attachmentMeta";
    const ATTACHMENT_BLOB_STORE = "attachmentBlobs";

    const titleInput = document.getElementById("noteTitle");
    const textInput = document.getElementById("noteText");
    const mediaInput = document.getElementById("mediaInput");

    const attachmentList = document.getElementById("attachmentList");
    const notesDashboard = document.getElementById("notesDashboard");
    const emptyMessage = document.getElementById("emptyMessage");

    const recordBtn = document.getElementById("recordBtn");
    const stopBtn = document.getElementById("stopBtn");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    const statusText = document.getElementById("statusText");
    const storageInfo = document.getElementById("storageInfo");

    const mediaModal = document.getElementById("mediaModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalBackBtn = document.getElementById("modalBackBtn");

    let db;
    let currentAttachments = [];
    let originalAttachmentIds = [];

    let editingId = null;
    let editingCreatedAt = null;

    let mediaRecorder;
    let recordingStream;
    let audioChunks = [];

    let activeObjectUrl = null;
    let modalBackAction = null;
    let modalRequestNumber = 0;

    function makeId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }

      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function formatFileSize(bytes) {
      if (!bytes) {
        return "0 bytes";
      }

      if (bytes < 1024) {
        return bytes + " bytes";
      }

      if (bytes < 1024 * 1024) {
        return (bytes / 1024).toFixed(2) + " KB";
      }

      if (bytes < 1024 * 1024 * 1024) {
        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
    }

    function getAttachmentIcon(type) {
      if (type.startsWith("image/")) {
        return "🖼️";
      }

      if (type.startsWith("video/")) {
        return "🎥";
      }

      if (type.startsWith("audio/")) {
        return "🎙️";
      }

      return "📎";
    }

    function getAttachmentTypeLabel(type) {
      if (type.startsWith("image/")) {
        return "Photo";
      }

      if (type.startsWith("video/")) {
        return "Video";
      }

      if (type.startsWith("audio/")) {
        return "Voice recording";
      }

      return "Attachment";
    }

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = function (event) {
          const database = event.target.result;
          const transaction = event.target.transaction;

          let notesStore;

          if (!database.objectStoreNames.contains(NOTES_STORE)) {
            notesStore = database.createObjectStore(NOTES_STORE, {
              keyPath: "id"
            });
          } else {
            notesStore = transaction.objectStore(NOTES_STORE);
          }

          let attachmentMetaStore;

          if (!database.objectStoreNames.contains(ATTACHMENT_META_STORE)) {
            attachmentMetaStore = database.createObjectStore(
              ATTACHMENT_META_STORE,
              { keyPath: "id" }
            );
          } else {
            attachmentMetaStore = transaction.objectStore(
              ATTACHMENT_META_STORE
            );
          }

          if (!attachmentMetaStore.indexNames.contains("noteId")) {
            attachmentMetaStore.createIndex("noteId", "noteId", {
              unique: false
            });
          }

          let attachmentBlobStore;

          if (!database.objectStoreNames.contains(ATTACHMENT_BLOB_STORE)) {
            attachmentBlobStore = database.createObjectStore(
              ATTACHMENT_BLOB_STORE,
              { keyPath: "id" }
            );
          } else {
            attachmentBlobStore = transaction.objectStore(
              ATTACHMENT_BLOB_STORE
            );
          }

          /*
            Migrates the older version of this app:
            old notes stored media inside each note.
            new version stores media separately for faster note loading.
          */
          if (event.oldVersion > 0 && event.oldVersion < 2) {
            const cursorRequest = notesStore.openCursor();

            cursorRequest.onsuccess = function (cursorEvent) {
              const cursor = cursorEvent.target.result;

              if (!cursor) {
                return;
              }

              const oldNote = cursor.value;
              const oldAttachments = Array.isArray(oldNote.attachments)
                ? oldNote.attachments
                : [];

              oldAttachments.forEach((attachment) => {
                const attachmentId = attachment.id || makeId();

                attachmentMetaStore.put({
                  id: attachmentId,
                  noteId: oldNote.id,
                  name: attachment.name || "Attachment",
                  type: attachment.type || "application/octet-stream",
                  size: attachment.size || attachment.blob?.size || 0,
                  createdAt: oldNote.createdAt || new Date().toISOString()
                });

                if (attachment.blob) {
                  attachmentBlobStore.put({
                    id: attachmentId,
                    blob: attachment.blob
                  });
                }
              });

              delete oldNote.attachments;
              oldNote.attachmentCount = oldAttachments.length;

              cursor.update(oldNote);
              cursor.continue();
            };
          }
        };

        request.onsuccess = function (event) {
          db = event.target.result;
          resolve();
        };

        request.onerror = function () {
          reject(request.error || new Error("Database could not open."));
        };
      });
    }

    function getAllNotes() {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(NOTES_STORE, "readonly");
        const store = transaction.objectStore(NOTES_STORE);
        const request = store.getAll();

        request.onsuccess = function () {
          resolve(request.result);
        };

        request.onerror = function () {
          reject(request.error);
        };
      });
    }

    function getNoteById(id) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(NOTES_STORE, "readonly");
        const store = transaction.objectStore(NOTES_STORE);
        const request = store.get(id);

        request.onsuccess = function () {
          resolve(request.result);
        };

        request.onerror = function () {
          reject(request.error);
        };
      });
    }

    function getAttachmentMetadata(noteId) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(
          ATTACHMENT_META_STORE,
          "readonly"
        );

        const store = transaction.objectStore(ATTACHMENT_META_STORE);
        const index = store.index("noteId");
        const request = index.getAll(noteId);

        request.onsuccess = function () {
          resolve(request.result);
        };

        request.onerror = function () {
          reject(request.error);
        };
      });
    }

    function getAttachmentBlob(id) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(
          ATTACHMENT_BLOB_STORE,
          "readonly"
        );

        const store = transaction.objectStore(ATTACHMENT_BLOB_STORE);
        const request = store.get(id);

        request.onsuccess = function () {
          resolve(request.result ? request.result.blob : null);
        };

        request.onerror = function () {
          reject(request.error);
        };
      });
    }

    function saveNoteAndAttachments(note, newAttachments, removedAttachmentIds) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(
          [NOTES_STORE, ATTACHMENT_META_STORE, ATTACHMENT_BLOB_STORE],
          "readwrite"
        );

        const notesStore = transaction.objectStore(NOTES_STORE);
        const metadataStore = transaction.objectStore(ATTACHMENT_META_STORE);
        const blobStore = transaction.objectStore(ATTACHMENT_BLOB_STORE);

        notesStore.put(note);

        newAttachments.forEach((attachment) => {
          metadataStore.put({
            id: attachment.id,
            noteId: note.id,
            name: attachment.name,
            type: attachment.type,
            size: attachment.size,
            createdAt: attachment.createdAt || new Date().toISOString()
          });

          blobStore.put({
            id: attachment.id,
            blob: attachment.blob
          });
        });

        removedAttachmentIds.forEach((id) => {
          metadataStore.delete(id);
          blobStore.delete(id);
        });

        transaction.oncomplete = function () {
          resolve();
        };

        transaction.onerror = function () {
          reject(transaction.error);
        };

        transaction.onabort = function () {
          reject(transaction.error);
        };
      });
    }

    async function deleteNoteAndAttachments(noteId) {
      const attachments = await getAttachmentMetadata(noteId);

      return new Promise((resolve, reject) => {
        const transaction = db.transaction(
          [NOTES_STORE, ATTACHMENT_META_STORE, ATTACHMENT_BLOB_STORE],
          "readwrite"
        );

        const notesStore = transaction.objectStore(NOTES_STORE);
        const metadataStore = transaction.objectStore(ATTACHMENT_META_STORE);
        const blobStore = transaction.objectStore(ATTACHMENT_BLOB_STORE);

        notesStore.delete(noteId);

        attachments.forEach((attachment) => {
          metadataStore.delete(attachment.id);
          blobStore.delete(attachment.id);
        });

        transaction.oncomplete = function () {
          resolve();
        };

        transaction.onerror = function () {
          reject(transaction.error);
        };
      });
    }

    async function requestPersistentStorage() {
      if (!navigator.storage || !navigator.storage.persist) {
        return;
      }

      try {
        await navigator.storage.persist();
      } catch (error) {
        console.log("Persistent storage request was not available.");
      }
    }

    async function updateStorageInfo() {
      if (!navigator.storage || !navigator.storage.estimate) {
        storageInfo.textContent = "Saved locally in this browser.";
        return;
      }

      try {
        const estimate = await navigator.storage.estimate();
        const usage = estimate.usage || 0;
        const quota = estimate.quota || 0;

        storageInfo.textContent =
          "Local browser storage: " +
          formatFileSize(usage) +
          " used" +
          (quota ? " of about " + formatFileSize(quota) : "") +
          ".";
      } catch (error) {
        storageInfo.textContent = "Saved locally in this browser.";
      }
    }

    function createAttachmentRow(attachment, openAction, removeAction) {
      const row = document.createElement("div");
      row.className = "attachment-row";

      const icon = document.createElement("div");
      icon.className = "attachment-icon";
      icon.textContent = getAttachmentIcon(attachment.type);

      const details = document.createElement("div");
      details.className = "attachment-details";

      const fileName = document.createElement("strong");
      fileName.textContent = attachment.name;

      const fileInfo = document.createElement("span");
      fileInfo.textContent =
        getAttachmentTypeLabel(attachment.type) +
        " • " +
        formatFileSize(attachment.size);

      details.appendChild(fileName);
      details.appendChild(fileInfo);

      const actions = document.createElement("div");
      actions.className = "attachment-actions";

      if (openAction) {
        const openButton = document.createElement("button");
        openButton.className = "open-attachment-btn";
        openButton.textContent = "Open";
        openButton.onclick = openAction;
        actions.appendChild(openButton);
      }

      if (removeAction) {
        const removeButton = document.createElement("button");
        removeButton.className = "remove-media-btn";
        removeButton.textContent = "Remove";
        removeButton.onclick = removeAction;
        actions.appendChild(removeButton);
      }

      row.appendChild(icon);
      row.appendChild(details);
      row.appendChild(actions);

      return row;
    }

    function renderAttachmentList() {
      attachmentList.innerHTML = "";

      if (currentAttachments.length === 0) {
        const emptyText = document.createElement("p");
        emptyText.className = "no-attachments";
        emptyText.textContent =
          "No attachments yet. Photos, videos, and recordings will appear here as lightweight file rows.";
        attachmentList.appendChild(emptyText);
        return;
      }

      currentAttachments.forEach((attachment, index) => {
        const row = createAttachmentRow(
          attachment,
          function () {
            openAttachmentViewer(attachment);
          },
          function () {
            currentAttachments.splice(index, 1);
            renderAttachmentList();
            statusText.textContent = "Attachment removed from this note.";
          }
        );

        attachmentList.appendChild(row);
      });
    }

    mediaInput.addEventListener("change", function () {
      const files = Array.from(mediaInput.files);

      files.forEach((file) => {
        if (
          !file.type.startsWith("image/") &&
          !file.type.startsWith("video/")
        ) {
          return;
        }

        currentAttachments.push({
          id: makeId(),
          name: file.name,
          type: file.type,
          size: file.size,
          createdAt: new Date().toISOString(),
          blob: file,
          isNew: true
        });
      });

      mediaInput.value = "";
      renderAttachmentList();

      statusText.textContent =
        files.length > 0
          ? "Media attached. It will not preview until you press Open."
          : "";
    });

    recordBtn.addEventListener("click", async function () {
      if (!navigator.mediaDevices || !window.MediaRecorder) {
        statusText.textContent =
          "Voice recording is not supported in this browser.";
        return;
      }

      try {
        recordingStream = await navigator.mediaDevices.getUserMedia({
          audio: true
        });

        audioChunks = [];

        const preferredMimeType = MediaRecorder.isTypeSupported("audio/webm")
          ? "audio/webm"
          : "";

        mediaRecorder = preferredMimeType
          ? new MediaRecorder(recordingStream, {
              mimeType: preferredMimeType
            })
          : new MediaRecorder(recordingStream);

        mediaRecorder.ondataavailable = function (event) {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = function () {
          const audioBlob = new Blob(audioChunks, {
            type: mediaRecorder.mimeType || "audio/webm"
          });

          currentAttachments.push({
            id: makeId(),
            name: "Voice Note - " + new Date().toLocaleString(),
            type: audioBlob.type || "audio/webm",
            size: audioBlob.size,
            createdAt: new Date().toISOString(),
            blob: audioBlob,
            isNew: true
          });

          recordingStream.getTracks().forEach((track) => track.stop());

          recordBtn.disabled = false;
          stopBtn.disabled = true;

          renderAttachmentList();
          statusText.textContent =
            "Voice recording attached. Press Open whenever you want to listen.";
        };

        mediaRecorder.start();

        recordBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.textContent = "Recording... speak now.";
      } catch (error) {
        statusText.textContent =
          "Microphone permission was denied or unavailable.";
      }
    });

    stopBtn.addEventListener("click", function () {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    });

    saveBtn.addEventListener("click", async function () {
      const title = titleInput.value.trim() || "Untitled Note";
      const text = textInput.value.trim();

      if (
        title === "Untitled Note" &&
        text === "" &&
        currentAttachments.length === 0
      ) {
        alert("Please write something or add media before saving.");
        return;
      }

      saveBtn.disabled = true;
      statusText.textContent = "Saving note...";

      try {
        const noteId = editingId || makeId();
        const now = new Date().toISOString();

        const currentAttachmentIds = new Set(
          currentAttachments.map((attachment) => attachment.id)
        );

        const removedAttachmentIds = originalAttachmentIds.filter(
          (id) => !currentAttachmentIds.has(id)
        );

        const newAttachments = currentAttachments.filter(
          (attachment) => attachment.isNew
        );

        const note = {
          id: noteId,
          title: title,
          text: text,
          attachmentCount: currentAttachments.length,
          createdAt: editingCreatedAt || now,
          updatedAt: now
        };

        await saveNoteAndAttachments(
          note,
          newAttachments,
          removedAttachmentIds
        );

        clearEditor();
        await renderNotes();
        await updateStorageInfo();

        statusText.textContent = "Note saved successfully.";
      } catch (error) {
        console.error(error);
        statusText.textContent =
          "The note could not save. Check your available device storage.";
      } finally {
        saveBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener("click", function () {
      clearEditor();
      statusText.textContent = "Edit canceled.";
    });

    async function renderNotes() {
      notesDashboard.innerHTML = "";

      const notes = await getAllNotes();

      notes.sort(function (a, b) {
        return new Date(b.updatedAt) - new Date(a.updatedAt);
      });

      emptyMessage.style.display = notes.length === 0 ? "block" : "none";

      notes.forEach((note) => {
        const noteCard = document.createElement("article");
        noteCard.className = "note-card";

        const noteTitle = document.createElement("h3");
        noteTitle.textContent = note.title;

        const dateInfo = document.createElement("small");
        dateInfo.textContent =
          "Updated: " + new Date(note.updatedAt).toLocaleString();

        noteCard.appendChild(noteTitle);
        noteCard.appendChild(dateInfo);

        if (note.text) {
          const noteText = document.createElement("p");
          noteText.className = "note-text";
          noteText.textContent = note.text;
          noteCard.appendChild(noteText);
        }

        if (note.attachmentCount > 0) {
          const mediaButton = document.createElement("button");
          mediaButton.className = "note-media-btn";
          mediaButton.textContent =
            "📎 Open " +
            note.attachmentCount +
            (note.attachmentCount === 1
              ? " Attachment"
              : " Attachments");

          mediaButton.onclick = function () {
            openSavedAttachments(note);
          };

          noteCard.appendChild(mediaButton);
        }

        const buttonsBox = document.createElement("div");
        buttonsBox.className = "card-buttons";

        const editButton = document.createElement("button");
        editButton.className = "edit-btn";
        editButton.textContent = "Edit";
        editButton.onclick = function () {
          editNote(note.id);
        };

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-btn";
        deleteButton.textContent = "Delete";
        deleteButton.onclick = function () {
          deleteNote(note.id);
        };

        buttonsBox.appendChild(editButton);
        buttonsBox.appendChild(deleteButton);

        noteCard.appendChild(buttonsBox);
        notesDashboard.appendChild(noteCard);
      });
    }

    async function editNote(id) {
      const note = await getNoteById(id);

      if (!note) {
        return;
      }

      const attachmentMetadata = await getAttachmentMetadata(id);

      titleInput.value = note.title;
      textInput.value = note.text;

      currentAttachments = attachmentMetadata.map((attachment) => ({
        ...attachment,
        isNew: false
      }));

      originalAttachmentIds = attachmentMetadata.map(
        (attachment) => attachment.id
      );

      editingId = note.id;
      editingCreatedAt = note.createdAt;

      saveBtn.textContent = "Update Note";
      cancelBtn.style.display = "block";

      renderAttachmentList();

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });

      statusText.textContent =
        "Editing note. Media remains unloaded until you press Open.";
    }

    async function deleteNote(id) {
      const shouldDelete = confirm(
        "Are you sure you want to delete this note and all of its attachments?"
      );

      if (!shouldDelete) {
        return;
      }

      try {
        await deleteNoteAndAttachments(id);

        if (editingId === id) {
          clearEditor();
        }

        await renderNotes();
        await updateStorageInfo();

        statusText.textContent = "Note deleted.";
      } catch (error) {
        statusText.textContent = "The note could not be deleted.";
      }
    }

    function clearEditor() {
      titleInput.value = "";
      textInput.value = "";

      currentAttachments = [];
      originalAttachmentIds = [];

      editingId = null;
      editingCreatedAt = null;

      saveBtn.textContent = "Save Note";
      cancelBtn.style.display = "none";

      renderAttachmentList();
    }

    async function openSavedAttachments(note) {
      const loading = document.createElement("p");
      loading.className = "loading-text";
      loading.textContent = "Loading attachment list...";

      const requestNumber = showModal(
        "Attachments - " + note.title,
        loading
      );

      try {
        const attachments = await getAttachmentMetadata(note.id);

        if (requestNumber !== modalRequestNumber || mediaModal.hidden) {
          return;
        }

        const list = document.createElement("div");
        list.className = "attachment-list";

        if (attachments.length === 0) {
          const emptyText = document.createElement("p");
          emptyText.className = "modal-empty";
          emptyText.textContent = "No attachments found.";
          list.appendChild(emptyText);
        } else {
          attachments.forEach((attachment) => {
            const row = createAttachmentRow(
              attachment,
              function () {
                openAttachmentViewer(attachment, function () {
                  openSavedAttachments(note);
                });
              }
            );

            list.appendChild(row);
          });
        }

        showModal("Attachments - " + note.title, list);
      } catch (error) {
        const errorText = document.createElement("p");
        errorText.className = "modal-empty";
        errorText.textContent = "Attachments could not load.";

        showModal("Attachments", errorText);
      }
    }

    async function openAttachmentViewer(attachment, backAction = null) {
      const loading = document.createElement("p");
      loading.className = "loading-text";
      loading.textContent = "Opening attachment...";

      const requestNumber = showModal(
        "Opening attachment",
        loading,
        backAction
      );

      try {
        const blob = attachment.blob
          ? attachment.blob
          : await getAttachmentBlob(attachment.id);

        if (requestNumber !== modalRequestNumber || mediaModal.hidden) {
          return;
        }

        if (!blob) {
          throw new Error("Attachment file was not found.");
        }

        releaseActiveObjectUrl();
        activeObjectUrl = URL.createObjectURL(blob);

        const viewer = document.createElement("div");

        const info = document.createElement("p");
        info.className = "modal-file-info";
        info.textContent =
          getAttachmentTypeLabel(attachment.type) +
          " • " +
          formatFileSize(attachment.size);

        viewer.appendChild(info);

        if (attachment.type.startsWith("image/")) {
          const image = document.createElement("img");
          image.src = activeObjectUrl;
          image.alt = attachment.name;
          viewer.appendChild(image);
        } else if (attachment.type.startsWith("video/")) {
          const video = document.createElement("video");
          video.src = activeObjectUrl;
          video.controls = true;
          video.playsInline = true;
          video.preload = "metadata";
          viewer.appendChild(video);
        } else if (attachment.type.startsWith("audio/")) {
          const audio = document.createElement("audio");
          audio.src = activeObjectUrl;
          audio.controls = true;
          audio.preload = "none";
          viewer.appendChild(audio);
        } else {
          const unsupported = document.createElement("p");
          unsupported.className = "modal-empty";
          unsupported.textContent =
            "This attachment type cannot preview in the app.";
          viewer.appendChild(unsupported);
        }

        showModal(attachment.name, viewer, backAction, true);
      } catch (error) {
        const errorText = document.createElement("p");
        errorText.className = "modal-empty";
        errorText.textContent = "This attachment could not open.";

        showModal("Attachment Error", errorText, backAction);
      }
    }

    function releaseActiveObjectUrl() {
      if (activeObjectUrl) {
        URL.revokeObjectURL(activeObjectUrl);
        activeObjectUrl = null;
      }
    }

    function showModal(title, content, backAction = null, keepObjectUrl = false) {
      if (!keepObjectUrl) {
        releaseActiveObjectUrl();
      }

      modalRequestNumber++;

      modalTitle.textContent = title;
      modalBody.replaceChildren(content);

      modalBackAction = backAction;
      modalBackBtn.hidden = !backAction;

      mediaModal.hidden = false;

      return modalRequestNumber;
    }

    function closeModal() {
      modalRequestNumber++;
      releaseActiveObjectUrl();

      mediaModal.hidden = true;
      modalBody.innerHTML = "";
      modalBackAction = null;
      modalBackBtn.hidden = true;
    }

    modalCloseBtn.addEventListener("click", closeModal);

    modalBackBtn.addEventListener("click", function () {
      if (typeof modalBackAction === "function") {
        modalBackAction();
      }
    });

    mediaModal.addEventListener("click", function (event) {
      if (event.target === mediaModal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && !mediaModal.hidden) {
        closeModal();
      }
    });

    async function startApp() {
      try {
        await openDatabase();
        await requestPersistentStorage();

        renderAttachmentList();
        await renderNotes();
        await updateStorageInfo();
      } catch (error) {
        console.error(error);
        statusText.textContent =
          "The app could not start correctly in this browser.";
      }
    }

    startApp();
  </script>
</body>
</html>
