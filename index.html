<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Docs Opener</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #071f3d, #0f4c81);
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #d9f1ff;
    }

    header p {
      color: #b7ddf5;
      line-height: 1.5;
    }

    .upload-box {
      background: rgba(255, 255, 255, 0.12);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      margin-bottom: 25px;
      text-align: center;
    }

    .file-label {
      display: block;
      background: #38bdf8;
      color: #04243d;
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
      transition: 0.2s;
    }

    .file-label:hover {
      background: #7dd3fc;
    }

    input[type="file"] {
      display: none;
    }

    .file-info {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      text-align: left;
      color: #d9f1ff;
      display: none;
    }

    .file-info p {
      margin-bottom: 6px;
      word-break: break-word;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    button,
    .download-link {
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      text-decoration: none;
      text-align: center;
      flex: 1;
      min-width: 140px;
    }

    .open-btn {
      background: #0ea5e9;
      color: white;
    }

    .open-btn:hover {
      background: #0284c7;
    }

    .download-link {
      background: #22c55e;
      color: white;
    }

    .download-link:hover {
      background: #16a34a;
    }

    .clear-btn {
      background: #ef4444;
      color: white;
    }

    .clear-btn:hover {
      background: #dc2626;
    }

    .preview-title {
      margin-bottom: 15px;
      color: #d9f1ff;
    }

    .preview-box {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 15px;
      padding: 20px;
      min-height: 350px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .empty-preview {
      text-align: center;
      color: #b7ddf5;
      font-style: italic;
      margin-top: 120px;
    }

    iframe,
    video,
    audio {
      width: 100%;
      border: none;
      border-radius: 10px;
      background: white;
    }

    iframe {
      height: 650px;
    }

    video {
      max-height: 650px;
      background: black;
    }

    audio {
      margin-top: 20px;
    }

    img {
      max-width: 100%;
      display: block;
      margin: auto;
      border-radius: 10px;
    }

    pre {
      background: #e0f2fe;
      color: #082f49;
      padding: 18px;
      border-radius: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 650px;
      overflow: auto;
      line-height: 1.5;
    }

    .unsupported {
      background: #e0f2fe;
      color: #082f49;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      line-height: 1.6;
    }

    .unsupported h3 {
      margin-bottom: 10px;
      color: #075985;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #b7ddf5;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2rem;
      }

      iframe {
        height: 500px;
      }

      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Blue Docs Opener</h1>
      <p>Open any document from your device. Preview supported files directly in your browser.</p>
    </header>

    <section class="upload-box">
      <label for="fileInput" class="file-label">Choose Any Document</label>

      <input type="file" id="fileInput" />

      <div class="file-info" id="fileInfo">
        <p><strong>File name:</strong> <span id="fileName"></span></p>
        <p><strong>File type:</strong> <span id="fileType"></span></p>
        <p><strong>File size:</strong> <span id="fileSize"></span></p>

        <div class="buttons">
          <button class="open-btn" id="openBtn">Open File</button>
          <a class="download-link" id="downloadBtn" download>Download File</a>
          <button class="clear-btn" onclick="clearFile()">Clear</button>
        </div>
      </div>
    </section>

    <h2 class="preview-title">Document Preview</h2>

    <section class="preview-box" id="previewBox">
      <p class="empty-preview">No document selected yet.</p>
    </section>

    <footer>
      <p>Made with HTML, CSS and JavaScript</p>
    </footer>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const fileName = document.getElementById("fileName");
    const fileType = document.getElementById("fileType");
    const fileSize = document.getElementById("fileSize");
    const previewBox = document.getElementById("previewBox");
    const openBtn = document.getElementById("openBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    let currentFileUrl = null;

    fileInput.addEventListener("change", function () {
      const file = fileInput.files[0];

      if (!file) {
        return;
      }

      if (currentFileUrl) {
        URL.revokeObjectURL(currentFileUrl);
      }

      currentFileUrl = URL.createObjectURL(file);

      fileInfo.style.display = "block";
      fileName.textContent = file.name;
      fileType.textContent = file.type || "Unknown type";
      fileSize.textContent = formatFileSize(file.size);

      openBtn.onclick = function () {
        window.open(currentFileUrl, "_blank");
      };

      downloadBtn.href = currentFileUrl;
      downloadBtn.download = file.name;

      previewFile(file);
    });

    function previewFile(file) {
      previewBox.innerHTML = "";

      const extension = getFileExtension(file.name);
      const type = file.type;

      if (type === "application/pdf" || extension === "pdf") {
        const iframe = document.createElement("iframe");
        iframe.src = currentFileUrl;
        previewBox.appendChild(iframe);
        return;
      }

      if (type.startsWith("image/")) {
        const image = document.createElement("img");
        image.src = currentFileUrl;
        image.alt = file.name;
        previewBox.appendChild(image);
        return;
      }

      if (type.startsWith("video/")) {
        const video = document.createElement("video");
        video.src = currentFileUrl;
        video.controls = true;
        previewBox.appendChild(video);
        return;
      }

      if (type.startsWith("audio/")) {
        const audio = document.createElement("audio");
        audio.src = currentFileUrl;
        audio.controls = true;
        previewBox.appendChild(audio);
        return;
      }

      if (isTextFile(extension, type)) {
        const reader = new FileReader();

        reader.onload = function (event) {
          const pre = document.createElement("pre");
          pre.textContent = event.target.result;
          previewBox.appendChild(pre);
        };

        reader.readAsText(file);
        return;
      }

      showUnsupportedMessage(file);
    }

    function showUnsupportedMessage(file) {
      const unsupportedBox = document.createElement("div");
      unsupportedBox.className = "unsupported";

      unsupportedBox.innerHTML = `
        <h3>File Ready to Open</h3>
        <p>This file was loaded successfully.</p>
        <p>Your browser may not be able to preview this type of document inside the page.</p>
        <p>Use <strong>Open File</strong> or <strong>Download File</strong> above.</p>
        <br>
        <p><strong>Selected file:</strong> ${escapeHTML(file.name)}</p>
        <p><strong>File extension:</strong> .${escapeHTML(getFileExtension(file.name))}</p>
      `;

      previewBox.appendChild(unsupportedBox);
    }

    function getFileExtension(name) {
      if (!name.includes(".")) {
        return "unknown";
      }

      return name.split(".").pop().toLowerCase();
    }

    function isTextFile(extension, type) {
      const textExtensions = [
        "txt",
        "md",
        "html",
        "htm",
        "css",
        "js",
        "json",
        "xml",
        "csv",
        "log",
        "py",
        "java",
        "cpp",
        "c",
        "cs",
        "php",
        "rb",
        "sql",
        "ts",
        "jsx",
        "tsx"
      ];

      return type.startsWith("text/") || textExtensions.includes(extension);
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) {
        return bytes + " bytes";
      }

      if (bytes < 1024 * 1024) {
        return (bytes / 1024).toFixed(2) + " KB";
      }

      if (bytes < 1024 * 1024 * 1024) {
        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
    }

    function escapeHTML(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clearFile() {
      fileInput.value = "";
      fileInfo.style.display = "none";
      previewBox.innerHTML = '<p class="empty-preview">No document selected yet.</p>';

      if (currentFileUrl) {
        URL.revokeObjectURL(currentFileUrl);
      }

      currentFileUrl = null;
    }
  </script>
</body>
</html>
