<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Notes Manager</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #071f3d, #0f4c81);
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #d9f1ff;
    }

    header p {
      color: #b7ddf5;
    }

    .note-box {
      background: rgba(255, 255, 255, 0.12);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      margin-bottom: 30px;
    }

    .note-box input,
    .note-box textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
    }

    .note-box textarea {
      resize: none;
      height: 120px;
    }

    button {
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .add-btn {
      background: #38bdf8;
      color: #04243d;
      width: 100%;
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .add-btn:hover {
      background: #7dd3fc;
    }

    .cancel-btn {
      background: #64748b;
      color: white;
      width: 100%;
      font-size: 1rem;
      display: none;
    }

    .cancel-btn:hover {
      background: #475569;
    }

    .dashboard-title {
      margin-bottom: 15px;
      color: #d9f1ff;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }

    .note-card {
      background: #e0f2fe;
      color: #082f49;
      padding: 18px;
      border-radius: 15px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.3s ease;
    }

    .note-card h3 {
      margin-bottom: 10px;
      color: #075985;
    }

    .note-card p {
      line-height: 1.5;
      margin-bottom: 15px;
      white-space: pre-wrap;
    }

    .card-buttons {
      display: flex;
      gap: 10px;
    }

    .edit-btn {
      background: #0ea5e9;
      color: white;
      font-size: 0.9rem;
      flex: 1;
    }

    .edit-btn:hover {
      background: #0284c7;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      font-size: 0.9rem;
      flex: 1;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .empty-message {
      text-align: center;
      color: #b7ddf5;
      margin-top: 20px;
      font-style: italic;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #b7ddf5;
      font-size: 0.9rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2rem;
      }

      .card-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Blue Notes Manager</h1>
      <p>Add, save, edit, and remove your notes from the dashboard.</p>
    </header>

    <section class="note-box">
      <input type="text" id="noteTitle" placeholder="Note title..." />
      <textarea id="noteText" placeholder="Write your note here..."></textarea>

      <button class="add-btn" id="mainBtn" onclick="addOrUpdateNote()">Add Note</button>
      <button class="cancel-btn" id="cancelBtn" onclick="cancelEdit()">Cancel Edit</button>
    </section>

    <h2 class="dashboard-title">Notes Dashboard</h2>

    <section class="notes-grid" id="notesDashboard"></section>

    <p class="empty-message" id="emptyMessage">No notes yet. Add your first note above.</p>

    <footer>
      <p>Made with HTML, CSS and JavaScript</p>
    </footer>
  </div>

  <script>
    const titleInput = document.getElementById("noteTitle");
    const textInput = document.getElementById("noteText");
    const notesDashboard = document.getElementById("notesDashboard");
    const emptyMessage = document.getElementById("emptyMessage");
    const mainBtn = document.getElementById("mainBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    let editingIndex = null;

    function saveNotes() {
      localStorage.setItem("notes", JSON.stringify(notes));
    }

    function renderNotes() {
      notesDashboard.innerHTML = "";

      if (notes.length === 0) {
        emptyMessage.style.display = "block";
      } else {
        emptyMessage.style.display = "none";
      }

      notes.forEach((note, index) => {
        const noteCard = document.createElement("div");
        noteCard.className = "note-card";

        const noteTitle = document.createElement("h3");
        noteTitle.textContent = note.title;

        const noteText = document.createElement("p");
        noteText.textContent = note.text;

        const buttonsBox = document.createElement("div");
        buttonsBox.className = "card-buttons";

        const editBtn = document.createElement("button");
        editBtn.className = "edit-btn";
        editBtn.textContent = "Edit";
        editBtn.onclick = function () {
          editNote(index);
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "Remove";
        deleteBtn.onclick = function () {
          deleteNote(index);
        };

        buttonsBox.appendChild(editBtn);
        buttonsBox.appendChild(deleteBtn);

        noteCard.appendChild(noteTitle);
        noteCard.appendChild(noteText);
        noteCard.appendChild(buttonsBox);

        notesDashboard.appendChild(noteCard);
      });
    }

    function addOrUpdateNote() {
      const title = titleInput.value.trim();
      const text = textInput.value.trim();

      if (title === "" || text === "") {
        alert("Please write a title and a note.");
        return;
      }

      if (editingIndex === null) {
        notes.push({
          title: title,
          text: text
        });
      } else {
        notes[editingIndex] = {
          title: title,
          text: text
        };

        editingIndex = null;
        mainBtn.textContent = "Add Note";
        cancelBtn.style.display = "none";
      }

      saveNotes();
      renderNotes();

      titleInput.value = "";
      textInput.value = "";
    }

    function editNote(index) {
      titleInput.value = notes[index].title;
      textInput.value = notes[index].text;

      editingIndex = index;
      mainBtn.textContent = "Update Note";
      cancelBtn.style.display = "block";

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function cancelEdit() {
      editingIndex = null;

      titleInput.value = "";
      textInput.value = "";

      mainBtn.textContent = "Add Note";
      cancelBtn.style.display = "none";
    }

    function deleteNote(index) {
      notes.splice(index, 1);

      if (editingIndex === index) {
        cancelEdit();
      }

      saveNotes();
      renderNotes();
    }

    renderNotes();
  </script>
</body>
</html>
